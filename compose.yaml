#      test: [ "CMD-SHELL", "pg_isready -U appuser -d automate" ]
#      interval: 5s
#      timeout: 5s
#      retries: 20

  app:
    image: automate
    container_name: automate-app
    depends_on:
#      - postgres
      - mysql
    ports:
      - "8088:8080"
    environment:
#      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/automate
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/automate?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass

volumes:
  mysql-data:
